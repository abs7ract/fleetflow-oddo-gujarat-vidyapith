{% extends 'base.html' %}
{% block content %}
<h2 class="text-3xl font-bold mb-6">Command Center</h2>

<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
    <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
        <p class="text-sm text-gray-500">Active Fleet</p>
        <p class="text-2xl font-bold text-blue-600">12</p> </div>
    <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
        <p class="text-sm text-gray-500">Maintenance Alerts</p>
        <p class="text-2xl font-bold text-red-600">3</p>
    </div>
    <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
        <p class="text-sm text-gray-500">Utilization Rate</p>
        <p class="text-2xl font-bold text-green-600">85%</p>
    </div>
    <div class="bg-white p-4 rounded shadow-sm border border-gray-200">
        <p class="text-sm text-gray-500">Pending Cargo</p>
        <p class="text-2xl font-bold text-orange-600">5</p>
    </div>
</div>

<div class="bg-white rounded shadow-sm border border-gray-200 overflow-hidden">
    <div class="p-4 bg-gray-50 border-b flex justify-between items-center">
        <h3 class="font-bold text-gray-700">Live Fleet Status</h3>
        <select class="border p-1 rounded text-sm"><option>Filter: All Regions [cite: 20]</option></select>
    </div>
    <table class="w-full text-left">
        <thead class="bg-gray-100 text-gray-600 text-sm">
            <tr><th class="p-4">Vehicle</th><th class="p-4">License Plate</th><th class="p-4">Status</th></tr>
        </thead>
        <tbody>
            <tr class="border-t"><td class="p-4">Van-05</td><td class="p-4">ABC-123</td><td class="p-4"><span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-xs">On Trip</span></td></tr>
        </tbody>
    </table>
</div>
{% endblock %}
